<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Litter</title>
    <link rel="stylesheet" th:href="@{css/index.css}" />
    <script th:src="@{js/index.js}"></script>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <main>
      <ul class="left-menu">
        <li id="litter-logo">
          <a th:href="@{/}">
            <img th:src="@{img/litter-logo.png}" />
          </a>
        </li>
        <li>
          <a th:href="@{/}">
            <img th:src="@{img/icons/home.svg}" />
            <span>Página inicial</span>
          </a>
        </li>
        <li>
          <a th:href="@{'/' + ${user.handle}}">
            <img th:src="@{img/icons/user.svg}" />
            <span>Perfil</span>
          </a>
        </li>
        <li>
          <a th:href="@{/signup}">Cadastrar</a>
        </li>
      </ul>
      <div class="posts-container">
        <form th:action="@{/post}" method="post" th:object="${post}">
          <div class="icon-textarea">
            <a th:href="@{/{handle}(handle=${user.handle})}">
              <img th:src="${user.picture}" class="user-icon-form" alt="" />
            </a>
            <textarea
              th:field="*{content}"
              placeholder="O que você está planejando hoje?"
              maxlength="256"
            ></textarea>
          </div>
          <button>Postar</button>
        </form>
        <div class="db-posts">
          <div
            class="single-post"
            th:each="post : ${posts}"
            th:onclick='|window.location.href="@{/post/{uuid}(uuid=${post.uuid})}"|'
          >
            <div>
              <a th:href="@{/{handle}(handle=${post.handle})}">
                <img th:src="${post.picture}" class="user-icon" alt="" />
              </a>
            </div>
            <div class="text-side">
              <div class="user-id">
                <a
                  th:href="@{/{handle}(handle=${post.handle})}"
                  th:text="${post.username}"
                ></a>
                <span class="user-handle" th:text="'@'+${post.handle}"></span>
              </div>
              <a th:href="@{/delete/{uuid}(uuid=${post.uuid})}" th:if="${post.user_id.equals('fd6d4acf-ebab-4610-8b18-56609c49445f')}">
                <img th:src="@{/img/icons/trash.svg}" class="trash-icon" />
              </a>
              <p th:text="${post.content}"></p>
              <div class="interactions">
                <div class="">
                  <img
                    th:src="@{img/icons/star.svg}"
                    class="interaction-icon"
                  />
                  <span>0</span>
                </div>
                <div class="">
                  <img
                    th:src="@{img/icons/repost.svg}"
                    class="interaction-icon"
                  />
                  <span>0</span>
                </div>
                <div>
                  <img
                    th:src="@{img/icons/comment.svg}"
                    class="interaction-icon"
                  />
                  <span th:text="${post.reply_count}"></span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <ul class="trends">
        <li id="trends-title">O que está acontecendo</li>
        <li>#CulpaDoHumano</li>
        <li>PASSEIO AGORA</li>
        <li>#PETISCO_JÁ</li>
        <li>#DormirNoTeclado</li>
        <li>Veterinário não</li>
      </ul>
    </main>
  </body>
</html>
